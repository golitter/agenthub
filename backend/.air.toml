root = "."
tmp_dir = "bin"

[build]
  bin = "./bin/server"
  cmd = "go build -o ./bin/server ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "docs"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "yaml", "yml"]
  kill_delay = "1s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
