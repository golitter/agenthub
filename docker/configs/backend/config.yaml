# Docker 环境 Backend 配置
# 构建时会 COPY 到容器内 /app/configs/config.yaml

mysql:
  host: mysql                 # Docker Compose 服务名
  port: 3306
  user: root
  password: "123456"          # ⚠️ 部署前请修改
  dbname: agenthub
  charset: utf8mb4

jwt:
  secret: agenthub-demo-secret  # ⚠️ 部署前请修改（openssl rand -hex 32）
  expire_hours: 24

agentend:
  host: http://host.docker.internal  # macOS 访问宿主机上的 agentend
  port: 8001

redis:
  host: redis                 # Docker Compose 服务名
  port: 6379
  password: ""
  db: 0

admin:
  password: "123456"          # ⚠️ 部署前请修改

qiniu:
  bucket: "agenthub"
  domain: "http://tfj4mvkda.hd-bkt.clouddn.com"
  region: z0    # z0=华东 z1=华北 z2=华南 na0=北美

cors:
  allow_origins:
    - "http://localhost"
    - "http://localhost:8787"
