services:
  mysql:
    image: mysql:8.0
    container_name: agenthub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"    # ⚠️ 与 configs/backend/config.yaml 中一致
      MYSQL_DATABASE: agenthub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agenthub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: agenthub-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: agenthub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8787:80"

volumes:
  mysql_data:
  redis_data:
