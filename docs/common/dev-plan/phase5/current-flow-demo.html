<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Flow Demo — Orchestrator 编排流程（真实代码逻辑 v2）</title>
<style>
  :root {
    --background: #0A0B0E;
    --foreground: #E8EBF0;
    --card: #1A1D24;
    --primary: #6366F1;
    --primary-soft: rgba(99, 102, 241, 0.08);
    --primary-border: rgba(99, 102, 241, 0.15);
    --muted: #22262F;
    --muted-foreground: #8B91A0;
    --accent: #22262F;
    --border: rgba(255,255,255,0.06);
    --sidebar: #111318;
    --text-secondary: #8B91A0;
    --text-tertiary: #5A6070;
    --agent-claude: #DA7756;
    --agent-opencode: #10B981;
    --agent-orchestrator: #EAB308;
    --agent-codex: #6366F1;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Geist Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--background); color: var(--foreground);
    height: 100vh; display: flex; overflow: hidden; letter-spacing: -0.01em;
  }

  /* Sidebar */
  .icon-sidebar { width: 56px; display: flex; flex-direction: column; align-items: center;
    border-right: 1px solid var(--border); background: var(--sidebar); padding: 12px 0; gap: 4px; flex-shrink: 0; }
  .user-avatar { width: 36px; height: 36px; border-radius: var(--radius); background: var(--primary);
    display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: white; margin-bottom: 16px; }
  .nav-icon { width: 44px; height: 44px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; border-radius: var(--radius); cursor: pointer; color: var(--muted-foreground); gap: 2px; }
  .nav-icon.active { background: var(--primary); color: white; }

  /* Conv list */
  .conv-list { width: 280px; display: flex; flex-direction: column; border-right: 1px solid var(--border);
    background: var(--sidebar); flex-shrink: 0; }
  .conv-header { padding: 12px; border-bottom: 1px solid var(--border); }
  .conv-header h3 { font-size: 14px; font-weight: 600; }
  .conv-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; cursor: pointer; border-left: 2px solid transparent; }
  .conv-item.active { background: var(--accent); border-left-color: var(--primary); }
  .conv-avatar { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 600; color: white; flex-shrink: 0; }
  .conv-preview { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }

  /* Chat */
  .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--background); }
  .chat-header { padding: 12px 20px; background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; }
  .chat-header h4 { font-size: 15px; font-weight: 600; }
  .agent-badges { display: flex; gap: 6px; }
  .agent-badge { padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-orchestrator { background: rgba(234,179,8,0.1); color: var(--agent-orchestrator); }
  .badge-claude { background: rgba(218,119,86,0.1); color: var(--agent-claude); }
  .badge-opencode { background: rgba(16,185,129,0.1); color: var(--agent-opencode); }

  /* Messages */
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

  .msg { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: white; margin-top: 2px; }
  .msg-body { display: flex; flex-direction: column; max-width: 100%; }
  .msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .msg-name { font-size: 12px; font-weight: 600; }
  .msg-name.orchestrator { color: var(--agent-orchestrator); }
  .msg-name.claude { color: var(--agent-claude); }
  .msg-name.opencode { color: var(--agent-opencode); }
  .msg-name.user-name { color: var(--primary); }
  .msg-time { font-size: 10px; color: var(--text-tertiary); }

  /* Bubble */
  .bubble {
    position: relative; max-width: 100%; border-radius: var(--radius);
    background: var(--card); border: 1px solid var(--border); padding: 12px 16px;
    font-size: 14px; line-height: 1.7; word-break: break-word;
  }
  .bubble::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .bubble.orchestrator::before { background: var(--agent-orchestrator); }
  .bubble.claude::before { background: var(--agent-claude); }
  .bubble.opencode::before { background: var(--agent-opencode); }
  .bubble.user-bubble {
    background: var(--primary-soft); border-color: var(--primary-border);
  }
  .bubble.user-bubble::before { display: none; }

  /* Streaming bubble — highlighted border to distinguish from finalized */
  .bubble.streaming {
    border-color: rgba(99, 102, 241, 0.2);
    box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.05);
  }
  .bubble.streaming::after {
    content: 'streaming'; position: absolute; top: 4px; right: 8px;
    font-size: 9px; color: var(--primary); opacity: 0.5; font-family: 'SF Mono', monospace;
  }

  /* Blocks inside bubble */
  .block { margin: 6px 0; }
  .block + .block { margin-top: 8px; }
  .block-text { font-size: 14px; line-height: 1.7; }
  .block-text code { background: var(--muted); padding: 1px 4px; border-radius: 3px; font-size: 12px; }

  /* Plan card block */
  .plan-block {
    border: 1px solid rgba(234,179,8,0.15); border-radius: var(--radius);
    background: rgba(234,179,8,0.05); padding: 10px;
  }
  .plan-block-title { font-size: 13px; font-weight: 600; color: var(--agent-orchestrator); margin-bottom: 8px; }
  .plan-block-tasks { display: flex; flex-direction: column; gap: 4px; }
  .plan-task-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    border-radius: 6px; background: var(--card); font-size: 12px;
  }
  .plan-task-icon { font-size: 10px; }
  .plan-task-icon.pending { color: var(--text-tertiary); }
  .plan-task-icon.running { color: var(--agent-claude); }
  .plan-task-icon.done { color: var(--agent-opencode); }
  .plan-task-agent { font-size: 11px; font-weight: 500; border-radius: 10px; padding: 1px 6px; }
  .plan-task-agent.claude { background: rgba(218,119,86,0.1); color: var(--agent-claude); }
  .plan-task-agent.opencode { background: rgba(16,185,129,0.1); color: var(--agent-opencode); }
  .plan-task-title { flex: 1; color: var(--text-secondary); }

  /* Runtime status block */
  .rt-block { }
  .rt-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 500;
  }
  .rt-badge.running { background: rgba(99,102,241,0.1); color: var(--agent-codex); }
  .rt-badge.completed { background: rgba(16,185,129,0.1); color: var(--agent-opencode); }
  .rt-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .rt-dot.pulse { animation: statusPulse 1.5s ease-in-out infinite; }
  .rt-output {
    margin-top: 6px; padding: 8px 10px; border-radius: 6px;
    background: rgba(0,0,0,0.2); font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px; color: var(--text-secondary); line-height: 1.6;
    max-height: 120px; overflow-y: auto; white-space: pre-wrap;
  }

  .mention { padding: 1px 5px; border-radius: 4px; font-weight: 500; font-size: 13px; }
  .mention-claude { background: rgba(218,119,86,0.1); color: var(--agent-claude); }
  .mention-opencode { background: rgba(16,185,129,0.1); color: var(--agent-opencode); }

  .time-divider { text-align: center; font-size: 11px; color: var(--text-tertiary); padding: 6px 0; }

  .streaming-cursor {
    display: inline-block; width: 2px; height: 14px; background: var(--primary);
    margin-left: 2px; animation: cursorBlink 0.8s ease-in-out infinite; vertical-align: text-bottom;
  }

  /* Runtime blocks container label */
  .rt-label {
    font-size: 9px; color: var(--text-tertiary); font-family: 'SF Mono', monospace;
    margin-bottom: 4px; opacity: 0.7;
  }

  /* Fade out animation for runtime blocks clearing */
  .fade-out { animation: fadeOut 0.6s ease forwards; }

  /* SSE / Phase indicators */
  .phase-bar {
    position: fixed; top: 0; left: 336px; right: 0; z-index: 50;
    display: flex; border-bottom: 1px solid var(--border); background: rgba(10,11,14,0.9);
  }
  .phase-label { flex: 1; padding: 5px 16px; font-size: 11px; color: var(--text-tertiary); }
  .phase-label .hl { color: var(--agent-orchestrator); font-weight: 600; }
  .phase-label .store { color: var(--primary); font-weight: 500; font-family: 'SF Mono', monospace; font-size: 10px; }
  .sse-label {
    padding: 5px 16px; font-size: 10px; font-family: 'SF Mono','Fira Code',monospace;
    color: var(--primary); background: rgba(99,102,241,0.05); border-left: 1px solid var(--border);
    max-width: 400px; overflow: hidden; text-direction: ellipsis; white-space: nowrap;
  }

  .replay-btn {
    position: fixed; bottom: 20px; right: 30px; padding: 10px 20px; background: var(--primary);
    color: white; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer;
    z-index: 100; font-family: inherit; box-shadow: 0 4px 12px rgba(99,102,241,0.3);
  }
  .replay-btn:hover { opacity: 0.9; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; height: 0; margin: 0; padding: 0; overflow: hidden; } }
  @keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="icon-sidebar">
  <div class="user-avatar">我</div>
  <div class="nav-icon active">💬</div>
</div>

<div class="conv-list">
  <div class="conv-header"><h3>群聊</h3></div>
  <div class="conv-item active">
    <div class="conv-avatar" style="background:linear-gradient(135deg, var(--agent-orchestrator), var(--primary))">项目</div>
    <div>
      <div style="font-size:13px;font-weight:500">登录系统开发</div>
      <div class="conv-preview" id="convPreview">等待开始...</div>
    </div>
  </div>
</div>

<div class="chat-area">
  <div class="chat-header">
    <div style="display:flex;align-items:center;gap:12px">
      <h4>登录系统开发</h4>
      <div class="agent-badges">
        <span class="agent-badge badge-orchestrator">项目经理</span>
        <span class="agent-badge badge-claude">前端小助手</span>
        <span class="agent-badge badge-opencode">代码审查员</span>
      </div>
    </div>
    <div id="headerStatus"></div>
  </div>
  <div class="chat-messages" id="messages"></div>
</div>

<div class="phase-bar">
  <div class="phase-label" id="phaseLabel">Ready</div>
  <div class="sse-label" id="sseLabel">event: —</div>
</div>
<button class="replay-btn" id="replayBtn" onclick="startReplay()">▶ 播放</button>

<script>
const msgs = document.getElementById('messages');
let simRunning = false;

function scrollBottom() { msgs.scrollTop = msgs.scrollHeight; }
function setSSE(t) { document.getElementById('sseLabel').textContent = 'event: ' + t; }
function setPhase(t) { document.getElementById('phaseLabel').innerHTML = t; }
function setPreview(t) { document.getElementById('convPreview').textContent = t; }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function addTimeDivider(text) {
  const d = document.createElement('div');
  d.className = 'time-divider';
  d.textContent = text;
  msgs.appendChild(d);
  scrollBottom();
}

// Add a FINALIZED message (pure text, no runtime blocks)
function addFinalizedMsg(opts) {
  const d = document.createElement('div');
  d.className = 'msg';
  d.style.animation = 'fadeIn 0.3s ease';
  d.innerHTML = `
    <div class="msg-avatar" style="background:${opts.color}">${opts.avatar}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name ${opts.nameClass||''}">${opts.name}</span>
        <span class="msg-time">${opts.time||''}</span>
      </div>
      <div class="bubble ${opts.agentClass||''}">
        ${opts.innerHtml||''}
      </div>
    </div>
  `;
  msgs.appendChild(d);
  scrollBottom();
  return d;
}

// Add user message
function addUserMsg(opts) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.style.animation = 'fadeIn 0.3s ease';
  d.innerHTML = `
    <div class="msg-avatar" style="background:var(--primary)">我</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name user-name">我</span>
        <span class="msg-time">${opts.time||''}</span>
      </div>
      <div class="bubble user-bubble">${opts.text}</div>
    </div>
  `;
  msgs.appendChild(d);
  scrollBottom();
}

// The STREAMING pseudo-message: one evolving element at the bottom.
// It combines: runtimeBlocks (plan + runtime_status) + streamingContent
// When agent switches, we "split" it: finalize text → create new streaming element
let streamingEl = null;

function createStreamingMsg(opts) {
  // Remove old streaming element if exists
  if (streamingEl) streamingEl.remove();

  const d = document.createElement('div');
  d.className = 'msg';
  d.style.animation = 'fadeIn 0.3s ease';
  d.id = 'streaming-msg';
  d.innerHTML = `
    <div class="msg-avatar" style="background:${opts.color}">${opts.avatar}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name ${opts.nameClass||''}">${opts.name}</span>
        <span class="msg-time">${opts.time||''}</span>
      </div>
      <div class="bubble ${opts.agentClass||''} streaming" id="streaming-bubble">
        <div id="runtime-blocks"></div>
        <div class="block block-text" id="streaming-text">
          <span class="streaming-cursor"></span>
        </div>
      </div>
    </div>
  `;
  msgs.appendChild(d);
  scrollBottom();
  streamingEl = d;
  return d;
}

// Get the runtime-blocks container inside the streaming bubble
function getRuntimeBlocksContainer() {
  return document.getElementById('runtime-blocks');
}

// Get the streaming-text element
function getStreamingText() {
  return document.getElementById('streaming-text');
}

// Get the streaming bubble
function getStreamingBubble() {
  return document.getElementById('streaming-bubble');
}

// Streaming text into an element
async function streamText(el, text, opts = {}) {
  const speed = opts.speed || 15;
  const chunk = opts.chunkSize || 3;
  const fmt = opts.fmt || (t => t.replace(/\n/g, '<br>'));
  for (let i = 0; i < text.length; i += chunk) {
    el.innerHTML = fmt(text.slice(0, i + chunk)) + '<span class="streaming-cursor"></span>';
    scrollBottom();
    await delay(speed);
  }
  el.innerHTML = fmt(text);
}

// Plan card HTML
function planCardHTML() {
  return `
    <div class="plan-block">
      <div class="plan-block-title">执行计划</div>
      <div class="plan-block-tasks">
        <div class="plan-task-row">
          <span class="plan-task-icon pending" id="pt-1">○</span>
          <span class="plan-task-agent claude">前端小助手</span>
          <span class="plan-task-title">实现邮箱登录 + OAuth 按钮</span>
        </div>
        <div class="plan-task-row">
          <span class="plan-task-icon pending" id="pt-2">○</span>
          <span class="plan-task-agent opencode">代码审查员</span>
          <span class="plan-task-title">审查安全性</span>
        </div>
      </div>
    </div>`;
}

// Runtime status HTML
function runtimeStatusHTML(id, agentName, status) {
  const running = status === 'running';
  return `
    <div class="block rt-block" id="${id}">
      <span class="rt-badge ${status}" id="${id}-badge">
        <span class="rt-dot ${running ? 'pulse' : ''}"></span>${agentName} ${running ? '执行中' : '完成'}
      </span>
      <div class="rt-output" id="${id}-out"></div>
    </div>`;
}

async function startReplay() {
  if (simRunning) return;
  simRunning = true;
  document.getElementById('replayBtn').style.display = 'none';
  msgs.innerHTML = '';
  streamingEl = null;

  // ===================================================================
  // 0. User sends message
  //    store.sendMessage() → adds user message, sets status='loading'
  // ===================================================================
  setPhase('Graph: <span class="hl">用户消息</span>');
  setSSE('—');
  await delay(300);

  addTimeDivider('今天 14:30');
  addUserMsg({ text: '帮我实现一个登录系统，支持邮箱和 OAuth，需要确保安全性', time: '14:30' });
  setPreview('我: 实现登录系统...');
  await delay(800);

  // ===================================================================
  // 1. SSE: planning { node: "skill_prepare" }
  //    → Frontend: EventType.Planning, node !== "dispatch" → IGNORED
  //    runtimeBlocks unchanged, no UI change
  // ===================================================================
  setPhase('Graph: <span class="hl">skill_prepare_node</span>');
  setSSE('planning { node: "skill_prepare" }');
  setPhase('SSE <span class="store">EventType.Planning</span> → node ≠ "dispatch" → <span class="hl">ignored</span>');
  await delay(1000);

  // ===================================================================
  // 2. SSE: text { agent: "Orchestrator", agent_type: "orchestrator", text: "..." }
  //
  //    store.streamAgentUpdate("orchestrator", "Orchestrator")
  //      → first call, no agent change → just sets streamingAgentType/Name
  //    store.streamText(text) → streamingContent += text
  //
  //    MessageList constructs streaming pseudo-message:
  //      blocks = [...runtimeBlocks(=[]), ...reduceEventToBlocks(streamingContent)]
  //      agentType = streamingAgentType = "orchestrator"
  //
  //    → Streaming bubble appears with Orchestrator avatar
  // ===================================================================
  setSSE('text { agent: "Orchestrator", agent_type: "orchestrator" }');
  setPhase('<span class="store">streamAgentUpdate</span>(orchestrator) + <span class="store">streamText</span>');

  createStreamingMsg({
    name: '项目经理', nameClass: 'orchestrator', agentClass: 'orchestrator',
    color: 'var(--agent-orchestrator)', avatar: '项', time: '14:30'
  });
  setPreview('项目经理: 规划中...');

  await streamText(getStreamingText(),
    '将任务拆分为前端实现和代码审查两个步骤，串行执行（审查依赖实现完成）。');
  await delay(400);

  // ===================================================================
  // 3. SSE: planning { node: "dispatch", dispatch: { task-001 } }
  //    SSE: planning { node: "dispatch", dispatch: { task-002 } }
  //
  //    store.streamPlanEvent → runtimeBlocks.push(plan block)
  //    runtimeBlocks = [ plan{ tasks: [task-001, task-002] } ]
  //
  //    Streaming pseudo-message now renders:
  //      [...runtimeBlocks(plan), ...reduceEventToBlocks(text)]
  //    → Plan card appears INSIDE the streaming bubble (ABOVE text)
  // ===================================================================
  setPhase('SSE <span class="store">EventType.Planning</span> → node = "dispatch" → <span class="store">streamPlanEvent</span>');
  setSSE('planning { node: "dispatch", dispatch: { task-001 } }');

  const rbContainer = getRuntimeBlocksContainer();
  const planDiv = document.createElement('div');
  planDiv.className = 'block';
  planDiv.id = 'plan-block-container';
  planDiv.innerHTML = planCardHTML();
  rbContainer.appendChild(planDiv);
  scrollBottom();
  await delay(800);

  // ===================================================================
  // 4. SSE: runtime_executing { task_id: "task-001", agent: "前端小助手" }
  //
  //    store.streamRuntimeEvent → runtimeBlocks.push(runtime_status)
  //    runtimeBlocks = [ plan, runtime_status{task-001, running} ]
  //
  //    → Runtime status appears INSIDE the same streaming bubble
  //    → Plan task-001 icon updates (pending → running)
  // ===================================================================
  setPhase('<span class="store">streamRuntimeEvent</span> → runtimeBlocks += runtime_status{task-001, running}');
  setSSE('runtime_executing { task_id: "task-001", agent: "前端小助手" }');

  // Update plan task status
  document.getElementById('pt-1').className = 'plan-task-icon running';
  document.getElementById('pt-1').textContent = '●';

  const rt1Div = document.createElement('div');
  rt1Div.innerHTML = runtimeStatusHTML('rt-1', '前端小助手', 'running');
  rbContainer.appendChild(rt1Div.firstElementChild);
  scrollBottom();
  setPreview('前端小助手: 执行中...');
  await delay(400);

  // ===================================================================
  // 5. SSE: runtime_text { task_id: "task-001", text: "..." } × N
  //
  //    store.streamRuntimeText → updates runtime_status.streamingText
  //    → Text streams inside the runtime_status block
  // ===================================================================
  setSSE('runtime_text { task_id: "task-001", text: "..." }');

  const rtOut1 = document.getElementById('rt-1-out');
  const rtText1 = '$ npm install bcryptjs csurf express-rate-limit\n' +
    '> added 12 packages in 1.2s\n\n' +
    'Creating src/components/Login.tsx (+156 lines)\n' +
    'Creating src/config/rateLimit.ts (+24 lines)\n' +
    'Creating src/middleware/csrf.ts (+18 lines)';
  await streamText(rtOut1, rtText1, { speed: 8 });
  await delay(300);

  // ===================================================================
  // 6. SSE: runtime_completed { task_id: "task-001", success: true }
  //
  //    store.streamRuntimeEvent → runtimeBlocks[idx].status = "completed"
  //    runtimeBlocks = [ plan, runtime_status{task-001, completed} ]
  // ===================================================================
  setSSE('runtime_completed { task_id: "task-001", success: true }');

  document.getElementById('rt-1-badge').className = 'rt-badge completed';
  document.getElementById('rt-1-badge').innerHTML = '<span class="rt-dot"></span>前端小助手 完成';
  document.getElementById('pt-1').className = 'plan-task-icon done';
  document.getElementById('pt-1').textContent = '✓';
  await delay(400);

  // ===================================================================
  // 7. SSE: text { agent: "前端小助手", agent_type: "claude-code", text: "..." }
  //
  //    store.streamAgentUpdate("claude-code", "前端小助手")
  //      → agentChanged = true (orchestrator → claude-code)
  //      → streamingContent has text → FINALIZE orchestrator message:
  //          blocks = reduceEventToBlocks(streamingContent)  ← only text!
  //          messages.push({ agentType: "orchestrator", content, blocks: [text] })
  //          streamingContent = ''
  //      → ⚠️ runtimeBlocks is NOT touched! Persists across agent switch.
  //
  //    store.streamText(text) → streamingContent = "已完成..."
  //
  //    MessageList constructs NEW streaming pseudo-message:
  //      blocks = [...runtimeBlocks(plan, rt-1), ...reduceEventToBlocks(text)]
  //      agentType = "claude-code"
  //
  //    KEY: runtimeBlocks carry over to the new streaming bubble!
  //         The finalized Orchestrator message is pure text only.
  // ===================================================================
  setSSE('text { agent: "前端小助手", agent_type: "claude-code" }');
  setPhase(
    '<span class="store">streamAgentUpdate</span>(claude-code) → agent changed!<br>' +
    '→ finalize Orchestrator text as msg (pure text, NO runtime blocks)<br>' +
    '→ runtimeBlocks: [plan, rt-1] <span class="hl">PERSIST</span> → carry to new streaming bubble'
  );
  await delay(300);

  // 7a. Finalize Orchestrator message (pure text only)
  addFinalizedMsg({
    name: '项目经理', nameClass: 'orchestrator', agentClass: 'orchestrator',
    color: 'var(--agent-orchestrator)', avatar: '项', time: '14:30',
    innerHtml: '<div class="block-text">将任务拆分为前端实现和代码审查两个步骤，串行执行（审查依赖实现完成）。</div>'
  });

  // 7b. Create NEW streaming pseudo-message — runtimeBlocks carry over!
  //     In the real code: streamingBlocks = [...runtimeBlocks, ...reduceEventToBlocks(content)]
  //     So the plan card and runtime_status task-001 appear FIRST, then claude-code text
  createStreamingMsg({
    name: '前端小助手', nameClass: 'claude', agentClass: 'claude',
    color: 'var(--agent-claude)', avatar: '前', time: '14:33'
  });

  // Re-populate runtimeBlocks into the new streaming bubble
  const newRb = getRuntimeBlocksContainer();
  const planClone = document.createElement('div');
  planClone.className = 'block';
  planClone.id = 'plan-block-container';
  planClone.innerHTML = planCardHTML();
  // task-001 is already completed in plan
  planClone.querySelector('#pt-1').className = 'plan-task-icon done';
  planClone.querySelector('#pt-1').textContent = '✓';
  newRb.appendChild(planClone);

  const rt1Clone = document.createElement('div');
  rt1Clone.innerHTML = runtimeStatusHTML('rt-1', '前端小助手', 'completed');
  newRb.appendChild(rt1Clone.firstElementChild);
  scrollBottom();

  // 7c. Stream Claude Code's text
  setPreview('前端小助手: 回复中...');
  await streamText(getStreamingText(),
    '已完成登录系统实现：<br>' +
    '&bull; <code>Login.tsx</code> — 邮箱登录表单 + OAuth 按钮组<br>' +
    '&bull; <code>rateLimit.ts</code> — 可配置限流（默认 5 次/15 分钟）<br>' +
    '&bull; <code>csrf.ts</code> — CSRF token 中间件',
    { fmt: t => t });
  await delay(400);

  // ===================================================================
  // 8. SSE: runtime_executing { task_id: "task-002", agent: "代码审查员" }
  //
  //    store.streamRuntimeEvent → runtimeBlocks.push(runtime_status{task-002})
  //    runtimeBlocks = [ plan, rt-1{completed}, rt-2{running} ]
  //
  //    → New runtime status appears in the CURRENT streaming bubble
  //    → All 3 runtime blocks (plan + both runtime_status) are in ONE bubble
  // ===================================================================
  setPhase('<span class="store">streamRuntimeEvent</span> → runtimeBlocks += runtime_status{task-002, running}');
  setSSE('runtime_executing { task_id: "task-002", agent: "代码审查员" }');

  document.getElementById('pt-2').className = 'plan-task-icon running';
  document.getElementById('pt-2').textContent = '●';

  const rt2Div = document.createElement('div');
  rt2Div.innerHTML = runtimeStatusHTML('rt-2', '代码审查员', 'running');
  newRb.appendChild(rt2Div.firstElementChild);
  scrollBottom();
  setPreview('代码审查员: 执行中...');
  await delay(400);

  setSSE('runtime_text { task_id: "task-002", text: "..." }');
  const rtOut2 = document.getElementById('rt-2-out');
  const rtText2 = '$ taskctl summary task-001\n' +
    '> task-001: completed → Login.tsx, rateLimit.ts, csrf.ts\n\n' +
    'Analyzing security...\n' +
    'bcrypt cost=12 ✓ | CSRF ✓ | rate limit ✓ | OAuth state ✗ | session 24h ✓';
  await streamText(rtOut2, rtText2, { speed: 8 });
  await delay(300);

  setSSE('runtime_completed { task_id: "task-002", success: true }');
  document.getElementById('rt-2-badge').className = 'rt-badge completed';
  document.getElementById('rt-2-badge').innerHTML = '<span class="rt-dot"></span>代码审查员 完成';
  document.getElementById('pt-2').className = 'plan-task-icon done';
  document.getElementById('pt-2').textContent = '✓';
  await delay(400);

  // ===================================================================
  // 9. SSE: text { agent: "代码审查员", agent_type: "opencode", text: "..." }
  //
  //    streamAgentUpdate("opencode") → agent changed (claude-code → opencode)
  //    → Finalize Claude Code message (pure text, runtimeBlocks NOT included)
  //    → runtimeBlocks: [plan, rt-1, rt-2] PERSIST → carry to new streaming bubble
  // ===================================================================
  setSSE('text { agent: "代码审查员", agent_type: "opencode" }');
  setPhase(
    '<span class="store">streamAgentUpdate</span>(opencode) → agent changed!<br>' +
    '→ finalize Claude Code text (pure text) → runtimeBlocks <span class="hl">PERSIST</span>'
  );

  addFinalizedMsg({
    name: '前端小助手', nameClass: 'claude', agentClass: 'claude',
    color: 'var(--agent-claude)', avatar: '前', time: '14:33',
    innerHtml: '<div class="block-text">已完成登录系统实现：<br>' +
      '&bull; <code>Login.tsx</code> — 邮箱登录表单 + OAuth 按钮组<br>' +
      '&bull; <code>rateLimit.ts</code> — 可配置限流（默认 5 次/15 分钟）<br>' +
      '&bull; <code>csrf.ts</code> — CSRF token 中间件</div>'
  });

  // New streaming pseudo-message for OpenCode — runtimeBlocks carry over again!
  createStreamingMsg({
    name: '代码审查员', nameClass: 'opencode', agentClass: 'opencode',
    color: 'var(--agent-opencode)', avatar: '审', time: '14:36'
  });

  const newRb2 = getRuntimeBlocksContainer();
  const planClone2 = document.createElement('div');
  planClone2.className = 'block';
  planClone2.innerHTML = planCardHTML();
  planClone2.querySelector('#pt-1').className = 'plan-task-icon done';
  planClone2.querySelector('#pt-1').textContent = '✓';
  planClone2.querySelector('#pt-2').className = 'plan-task-icon done';
  planClone2.querySelector('#pt-2').textContent = '✓';
  newRb2.appendChild(planClone2);

  const rt1Clone2 = document.createElement('div');
  rt1Clone2.innerHTML = runtimeStatusHTML('rt-1', '前端小助手', 'completed');
  newRb2.appendChild(rt1Clone2.firstElementChild);

  const rt2Clone2 = document.createElement('div');
  rt2Clone2.innerHTML = runtimeStatusHTML('rt-2', '代码审查员', 'completed');
  newRb2.appendChild(rt2Clone2.firstElementChild);
  scrollBottom();

  setPreview('代码审查员: 回复中...');
  await streamText(getStreamingText(),
    '<strong>审查结果：</strong><br><br>' +
    '✅ 密码使用 bcrypt 哈希（cost factor 12）<br>' +
    '✅ CSRF token 已集成<br>' +
    '✅ 限流已配置（可配置）<br>' +
    '⚠️ <strong>需修复：</strong>OAuth state 参数验证缺失<br>' +
    '✅ Session 过期时间设置合理（24h）',
    { fmt: t => t });
  await delay(400);

  // ===================================================================
  // 10. SSE: text { agent: "Orchestrator", agent_type: "orchestrator", text: "..." }
  //
  //     streamAgentUpdate("orchestrator") → agent changed (opencode → orchestrator)
  //     → Finalize OpenCode message (pure text)
  //     → runtimeBlocks: [plan, rt-1, rt-2] PERSIST → carry to new streaming bubble
  // ===================================================================
  setSSE('text { agent: "Orchestrator", agent_type: "orchestrator" }');
  setPhase(
    '<span class="store">streamAgentUpdate</span>(orchestrator) → agent changed!<br>' +
    '→ finalize OpenCode text (pure text) → runtimeBlocks <span class="hl">PERSIST</span>'
  );

  addFinalizedMsg({
    name: '代码审查员', nameClass: 'opencode', agentClass: 'opencode',
    color: 'var(--agent-opencode)', avatar: '审', time: '14:36',
    innerHtml: '<div class="block-text"><strong>审查结果：</strong><br><br>' +
      '✅ 密码使用 bcrypt 哈希（cost factor 12）<br>' +
      '✅ CSRF token 已集成<br>' +
      '✅ 限流已配置（可配置）<br>' +
      '⚠️ <strong>需修复：</strong>OAuth state 参数验证缺失<br>' +
      '✅ Session 过期时间设置合理（24h）</div>'
  });

  // New streaming pseudo-message for Orchestrator aggregator
  createStreamingMsg({
    name: '项目经理', nameClass: 'orchestrator', agentClass: 'orchestrator',
    color: 'var(--agent-orchestrator)', avatar: '项', time: '14:38'
  });

  const newRb3 = getRuntimeBlocksContainer();
  const planClone3 = document.createElement('div');
  planClone3.className = 'block';
  planClone3.innerHTML = planCardHTML();
  planClone3.querySelector('#pt-1').className = 'plan-task-icon done';
  planClone3.querySelector('#pt-1').textContent = '✓';
  planClone3.querySelector('#pt-2').className = 'plan-task-icon done';
  planClone3.querySelector('#pt-2').textContent = '✓';
  newRb3.appendChild(planClone3);

  const rt1Clone3 = document.createElement('div');
  rt1Clone3.innerHTML = runtimeStatusHTML('rt-1', '前端小助手', 'completed');
  newRb3.appendChild(rt1Clone3.firstElementChild);

  const rt2Clone3 = document.createElement('div');
  rt2Clone3.innerHTML = runtimeStatusHTML('rt-2', '代码审查员', 'completed');
  newRb3.appendChild(rt2Clone3.firstElementChild);
  scrollBottom();

  setPreview('项目经理: 汇总中...');
  await streamText(getStreamingText(),
    '<strong>执行汇总</strong><br><br>' +
    '<span class="mention mention-claude">前端小助手</span> 完成了登录页实现（邮箱 + OAuth + 可配置限流）。<br>' +
    '<span class="mention mention-opencode">代码审查员</span> 审查通过，1 处需修复（OAuth state 后端验证）。<br><br>' +
    '<span class="mention mention-claude">前端小助手</span> 请补上 OAuth state 参数的后端验证后提交。',
    { fmt: t => t });
  await delay(400);

  // ===================================================================
  // 11. SSE: done { text: summary }
  //
  //     store.streamDone(sessionId):
  //       1. Finalize last streamingContent → messages.push(orchestrator msg, pure text)
  //       2. runtimeBlocks = []  ← ALL runtime blocks CLEARED
  //       3. streamingContent = '', streamingAgentType = undefined
  //       4. status = 'done'
  //
  //     Result: 4 finalized messages, ALL pure text.
  //             Plan card & runtime statuses were TRANSIENT — gone.
  // ===================================================================
  setSSE('done { text: "..." }');
  setPhase(
    '<span class="store">streamDone</span> → finalize last text + <span class="store">runtimeBlocks = []</span><br>' +
    '→ Plan card & runtime statuses <span class="hl">DISAPPEAR</span> — they were transient'
  );
  await delay(300);

  // Finalize last message (Orchestrator summary, pure text)
  addFinalizedMsg({
    name: '项目经理', nameClass: 'orchestrator', agentClass: 'orchestrator',
    color: 'var(--agent-orchestrator)', avatar: '项', time: '14:38',
    innerHtml: '<div class="block-text"><strong>执行汇总</strong><br><br>' +
      '<span class="mention mention-claude">前端小助手</span> 完成了登录页实现（邮箱 + OAuth + 可配置限流）。<br>' +
      '<span class="mention mention-opencode">代码审查员</span> 审查通过，1 处需修复（OAuth state 后端验证）。<br><br>' +
      '<span class="mention mention-claude">前端小助手</span> 请补上 OAuth state 参数的后端验证后提交。</div>'
  });

  // Remove streaming element (it's gone after streamDone)
  if (streamingEl) {
    streamingEl.classList.add('fade-out');
    await delay(600);
    streamingEl.remove();
    streamingEl = null;
  }

  setPreview('项目经理: 全部完成');
  document.getElementById('replayBtn').style.display = 'block';
  document.getElementById('replayBtn').innerHTML = '↻ 重新播放';
  simRunning = false;
}
</script>
